<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wotaland リサーチ・インタラクティブ可視化デモ</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  html,body { height:100%; }
  body { margin:0; font-family:-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;
         background:#0f1115; color:#e7e9ee; overflow:hidden; }
  .wrap { box-sizing:border-box; height:100%; display:flex; flex-direction:column;
          max-width:960px; margin:0 auto; padding:14px 18px; }
  h1 { font-size:16px; margin:0 0 2px; flex:0 0 auto; }
  p.sub { margin:0 0 10px; color:#8a90a2; font-size:12px; flex:0 0 auto; }
  .tabs { display:flex; gap:8px; margin-bottom:8px; flex:0 0 auto; }
  .tab { padding:5px 13px; border-radius:20px; background:#1c2030; color:#aeb4c6;
         cursor:pointer; font-size:12px; border:1px solid #2a3045; user-select:none; }
  .tab.active { background:#5b8cff; color:#fff; border-color:#5b8cff; }
  #chart { flex:1 1 auto; min-height:0; width:100%; }
  .foot { margin-top:6px; color:#666c80; font-size:10px; flex:0 0 auto; }
</style>
</head>
<body>
<div class="wrap">
  <h1>📊 インタラクティブ可視化デモ（Notion 埋め込み実証）</h1>
  <p class="sub">タブ切替・凡例クリック・ホバーで動きます。枠の下端をドラッグすると図も追従して拡大します。</p>
  <div class="tabs">
    <div class="tab active" data-k="trend">成長トレンド</div>
    <div class="tab" data-k="share">市場シェア</div>
    <div class="tab" data-k="radar">競合比較</div>
  </div>
  <div id="chart"></div>
  <div class="foot">Wotaland Inc. — ECharts demo · 数値はダミー</div>
</div>
<script>
const el = document.getElementById('chart');
const chart = echarts.init(el, 'dark');
const opts = {
  trend: {
    backgroundColor:'transparent',
    tooltip:{trigger:'axis'},
    legend:{textStyle:{color:'#aeb4c6'}},
    grid:{left:42,right:20,top:38,bottom:28},
    xAxis:{type:'category',data:['2023','2024','2025','2026E','2027E']},
    yAxis:{type:'value'},
    series:[
      {name:'売上($M)',type:'line',smooth:true,data:[12,19,28,45,68],areaStyle:{opacity:.15}},
      {name:'MAU(万)',type:'bar',data:[5,9,16,27,41]}
    ]
  },
  share: {
    backgroundColor:'transparent',
    tooltip:{trigger:'item'},
    legend:{bottom:0,textStyle:{color:'#aeb4c6'}},
    series:[{type:'pie',radius:['38%','66%'],data:[
      {value:45,name:'競合A'},{value:30,name:'競合B'},
      {value:15,name:'自社'},{value:10,name:'その他'}],
      label:{color:'#e7e9ee'}}]
  },
  radar: {
    backgroundColor:'transparent',
    tooltip:{},
    legend:{textStyle:{color:'#aeb4c6'}},
    radar:{indicator:[
      {name:'価格',max:100},{name:'機能',max:100},{name:'UX',max:100},
      {name:'サポート',max:100},{name:'ブランド',max:100}],
      axisName:{color:'#aeb4c6'}},
    series:[{type:'radar',data:[
      {value:[60,70,55,50,40],name:'競合A'},
      {value:[80,60,65,70,75],name:'自社'}]}]
  }
};
function render(k){ chart.clear(); chart.setOption(opts[k]); chart.resize(); }
render('trend');
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active'); render(t.dataset.k);
});
new ResizeObserver(()=>chart.resize()).observe(el);
window.addEventListener('resize',()=>chart.resize());
</script>
</body>
</html>
