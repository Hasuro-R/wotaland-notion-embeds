<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wotaland リサーチ・インタラクティブ可視化デモ</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  body { margin:0; font-family:-apple-system,"Hiragino Kaku Gothic ProN",sans-serif; background:#0f1115; color:#e7e9ee; }
  .wrap { max-width:880px; margin:0 auto; padding:20px; }
  h1 { font-size:18px; margin:0 0 4px; }
  p.sub { margin:0 0 16px; color:#8a90a2; font-size:13px; }
  .tabs { display:flex; gap:8px; margin-bottom:12px; }
  .tab { padding:6px 14px; border-radius:20px; background:#1c2030; color:#aeb4c6;
         cursor:pointer; font-size:13px; border:1px solid #2a3045; user-select:none; }
  .tab.active { background:#5b8cff; color:#fff; border-color:#5b8cff; }
  #chart { width:100%; height:420px; }
  .foot { margin-top:10px; color:#666c80; font-size:11px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>📊 インタラクティブ可視化デモ（Notion 埋め込み実証）</h1>
  <p class="sub">タブを切り替え・凡例クリック・ホバーで動きます。これが iframe 経由で Notion 内に表示されます。</p>
  <div class="tabs">
    <div class="tab active" data-k="trend">成長トレンド</div>
    <div class="tab" data-k="share">市場シェア</div>
    <div class="tab" data-k="radar">競合比較</div>
  </div>
  <div id="chart"></div>
  <div class="foot">Wotaland Inc. — ECharts demo · 数値はダミー</div>
</div>
<script>
const chart = echarts.init(document.getElementById('chart'), 'dark');
const opts = {
  trend: {
    backgroundColor:'transparent',
    tooltip:{trigger:'axis'},
    legend:{textStyle:{color:'#aeb4c6'}},
    grid:{left:40,right:20,top:40,bottom:30},
    xAxis:{type:'category',data:['2023','2024','2025','2026E','2027E']},
    yAxis:{type:'value'},
    series:[
      {name:'売上($M)',type:'line',smooth:true,data:[12,19,28,45,68],areaStyle:{opacity:.15}},
      {name:'MAU(万)',type:'bar',data:[5,9,16,27,41]}
    ]
  },
  share: {
    backgroundColor:'transparent',
    tooltip:{trigger:'item'},
    legend:{bottom:0,textStyle:{color:'#aeb4c6'}},
    series:[{type:'pie',radius:['40%','68%'],data:[
      {value:45,name:'競合A'},{value:30,name:'競合B'},
      {value:15,name:'自社'},{value:10,name:'その他'}],
      label:{color:'#e7e9ee'}}]
  },
  radar: {
    backgroundColor:'transparent',
    tooltip:{},
    legend:{textStyle:{color:'#aeb4c6'}},
    radar:{indicator:[
      {name:'価格',max:100},{name:'機能',max:100},{name:'UX',max:100},
      {name:'サポート',max:100},{name:'ブランド',max:100}],
      axisName:{color:'#aeb4c6'}},
    series:[{type:'radar',data:[
      {value:[60,70,55,50,40],name:'競合A'},
      {value:[80,60,65,70,75],name:'自社'}]}]
  }
};
function render(k){ chart.clear(); chart.setOption(opts[k]); }
render('trend');
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active'); render(t.dataset.k);
});
window.addEventListener('resize',()=>chart.resize());
</script>
</body>
</html>
